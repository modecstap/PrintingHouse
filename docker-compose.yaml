version: '3.8'

services:
  ph_backend:
    container_name: ph_backend
    build: /backend
    restart: always
    ports:
      - 8080:8080
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - SERVER_HOST=${SERVER_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - PYTHONUNBUFFERED=1
    command: python main.py
    depends_on:
      - ph_db

  ph_ui:
    container_name: ph_ui
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=${BACKEND_URL}
    restart: always
    ports:
      - 80:80
    depends_on:
      - ph_backend

  ph_db:
    container_name: eve_db
    image: postgres:16.4
    restart: always
    user: root
    ports:
      - 9742:5432
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: