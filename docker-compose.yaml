version: '3.8'

services:
  ph_backend:
    container_name: ph_backend
    build: /backend
    restart: always
    ports:
      - 8080:8080
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - SERVER_HOST=${SERVER_HOST}
      - PYTHONUNBUFFERED=1
    command: python main.py

  ph_ui:
    container_name: ph_ui
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=${BACKEND_URL}
    restart: always
    ports:
      - 80:80
    depends_on:
      - ph_backend

